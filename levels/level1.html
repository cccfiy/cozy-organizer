<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>化妆台收纳</title>

</head>

<body>

<h1>
✨ 公主的化妆台 ✨
</h1>

<div id="game">

<div id="panel">

<div class="item" data-id="bottle">🧴</div>
<div class="item" data-id="lipstick">💄</div>
<div class="item" data-id="phone">📱</div>
<div class="item" data-id="manicure">💅</div>
<div class="item" data-id="comb">🪮</div>
<div class="item" data-id="ring">💍</div>

<div class="item" data-id="candle">🕯️</div>
<div class="item" data-id="smallmirror">🪞</div>
<div class="item" data-id="letter">💌</div>
<div class="item" data-id="doll">🧸</div>
<div class="item" data-id="bouquet">🌹</div>
<div class="item" data-id="hairpin">🎀</div>

</div>


<div id="drawer">

<div id="mirror">🪞</div>
<div id="lamp">💡</div>
<div id="flower">🌷</div>

<div id="table">

<div class="makeup-box"></div>
<div class="skincare-box"></div>
<div class="ring-box"></div>

<div id="grid">
</div>
</div>
</div>
</div>

<div id="score">
已收纳 0/6
</div>

<div id="win">

    <div class="win-box">

        <h2>✨ 恭喜通过教程 ✨</h2>

        <p>
            好棒呀
        </p >

        <div class="stars">
            ⭐⭐⭐
        </div>

        <button id="nextLevel">
            下一关吧
        </button>

        <button id="replay">
            还要再玩
        </button>

        <button id="back">
            返回菜单
        </button>

    </div>

</div>

<button id="backMenu">← 菜单</button>

<script src="../js/game.js"></script>

</body>

</html>
